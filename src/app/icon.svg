<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" width="32" height="32">
  <!-- Rounded square background -->
  <rect width="32" height="32" rx="8" fill="#0f172a"/>

  <!-- Coin circle -->
  <circle cx="16" cy="17" r="9" fill="none" stroke="#22c55e" stroke-width="1.8"/>

  <!-- Dollar sign: vertical bar -->
  <rect x="15.1" y="10" width="1.8" height="14" rx="0.9" fill="#22c55e"/>

  <!-- Dollar sign: top arc (S upper curve) -->
  <path d="M13 13.5 Q13 11.5 16 11.5 Q19 11.5 19 13.5 Q19 15.5 16 16 Q13 16.5 13 18.5 Q13 20.5 16 20.5 Q19 20.5 19 18.5"
        fill="none" stroke="#22c55e" stroke-width="1.8" stroke-linecap="round"/>

  <!-- Two buddy dots above coin -->
  <circle cx="12" cy="5" r="1.8" fill="#22c55e" opacity="0.8"/>
  <circle cx="20" cy="5" r="1.8" fill="#22c55e" opacity="0.8"/>
  <!-- Connection line between buddies -->
  <line x1="13.8" y1="5" x2="18.2" y2="5" stroke="#22c55e" stroke-width="1.2" stroke-linecap="round" opacity="0.8"/>
</svg>
